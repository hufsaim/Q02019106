<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff0f5"/>
      <stop offset="100%" stop-color="#ffd6e7"/>
    </linearGradient>
    <radialGradient id="ball1" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#bg1)" rx="10"/>

  <!-- Bricks Row 1 (red) -->
  <rect x="30" y="22" width="52" height="18" rx="3" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <rect x="88" y="22" width="52" height="18" rx="3" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <rect x="146" y="22" width="52" height="18" rx="3" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <rect x="204" y="22" width="52" height="18" rx="3" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <rect x="262" y="22" width="52" height="18" rx="3" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <rect x="320" y="22" width="50" height="18" rx="3" fill="#ef4444" stroke="#fff" stroke-width="2"/>

  <!-- Bricks Row 2 (orange) -->
  <rect x="30" y="46" width="52" height="18" rx="3" fill="#f97316" stroke="#fff" stroke-width="2"/>
  <rect x="88" y="46" width="52" height="18" rx="3" fill="#f97316" stroke="#fff" stroke-width="2"/>
  <rect x="146" y="46" width="52" height="18" rx="3" fill="#f97316" stroke="#fff" stroke-width="2"/>
  <rect x="204" y="46" width="52" height="18" rx="3" fill="#f97316" stroke="#fff" stroke-width="2"/>
  <rect x="262" y="46" width="52" height="18" rx="3" fill="#f97316" stroke="#fff" stroke-width="2"/>
  <rect x="320" y="46" width="50" height="18" rx="3" fill="#f97316" stroke="#fff" stroke-width="2"/>

  <!-- Bricks Row 3 (yellow) -->
  <rect x="30" y="70" width="52" height="18" rx="3" fill="#eab308" stroke="#fff" stroke-width="2"/>
  <rect x="88" y="70" width="52" height="18" rx="3" fill="#eab308" stroke="#fff" stroke-width="2"/>
  <rect x="146" y="70" width="52" height="18" rx="3" fill="#eab308" stroke="#fff" stroke-width="2"/>
  <rect x="262" y="70" width="52" height="18" rx="3" fill="#eab308" stroke="#fff" stroke-width="2"/>
  <rect x="320" y="70" width="50" height="18" rx="3" fill="#eab308" stroke="#fff" stroke-width="2"/>

  <!-- Bricks Row 4 (pink) -->
  <rect x="30" y="94" width="52" height="18" rx="3" fill="#ec4899" stroke="#fff" stroke-width="2"/>
  <rect x="88" y="94" width="52" height="18" rx="3" fill="#ec4899" stroke="#fff" stroke-width="2"/>
  <rect x="204" y="94" width="52" height="18" rx="3" fill="#ec4899" stroke="#fff" stroke-width="2"/>
  <rect x="262" y="94" width="52" height="18" rx="3" fill="#ec4899" stroke="#fff" stroke-width="2"/>
  <rect x="320" y="94" width="50" height="18" rx="3" fill="#ec4899" stroke="#fff" stroke-width="2"/>

  <!-- Ball trail -->
  <circle cx="194" cy="145" r="5" fill="#f9a8d4" opacity="0.4"/>
  <circle cx="198" cy="138" r="4" fill="#f9a8d4" opacity="0.5"/>
  <circle cx="203" cy="131" r="3" fill="#f9a8d4" opacity="0.6"/>

  <!-- Ball -->
  <circle cx="208" cy="124" r="9" fill="url(#ball1)" stroke="#f472b6" stroke-width="1.5"/>

  <!-- Hello Kitty face (simplified) -->
  <ellipse cx="310" cy="155" rx="32" ry="30" fill="white" stroke="#f9a8d4" stroke-width="2"/>
  <!-- ears -->
  <ellipse cx="286" cy="130" rx="10" ry="10" fill="white" stroke="#f9a8d4" stroke-width="2"/>
  <ellipse cx="334" cy="130" rx="10" ry="10" fill="white" stroke="#f9a8d4" stroke-width="2"/>
  <!-- bow -->
  <path d="M296 128 Q305 122 310 128 Q315 122 324 128 Q315 135 310 128 Q305 135 296 128Z" fill="#ef4444"/>
  <circle cx="310" cy="128" r="3" fill="#fff"/>
  <!-- eyes -->
  <ellipse cx="300" cy="155" rx="3.5" ry="4" fill="#333"/>
  <ellipse cx="320" cy="155" rx="3.5" ry="4" fill="#333"/>
  <!-- nose -->
  <ellipse cx="310" cy="162" rx="2.5" ry="1.5" fill="#f9a8d4"/>
  <!-- whiskers -->
  <line x1="284" y1="159" x2="302" y2="162" stroke="#999" stroke-width="1"/>
  <line x1="284" y1="164" x2="302" y2="164" stroke="#999" stroke-width="1"/>
  <line x1="318" y1="162" x2="336" y2="159" stroke="#999" stroke-width="1"/>
  <line x1="318" y1="164" x2="336" y2="164" stroke="#999" stroke-width="1"/>

  <!-- Paddle -->
  <rect x="148" y="196" width="80" height="12" rx="6" fill="#f472b6" stroke="#db2777" stroke-width="1.5"/>

  <!-- Score area -->
  <text x="42" y="175" font-family="monospace" font-size="11" fill="#9d174d" font-weight="bold">SCORE: 3200</text>
  <text x="42" y="192" font-family="monospace" font-size="11" fill="#9d174d">LEVEL 3</text>

  <!-- Stars / sparkles -->
  <text x="204" y="93" font-size="14" fill="#fbbf24">✦</text>
</svg>
