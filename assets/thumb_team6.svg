<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0c0a2e"/>
    </linearGradient>
    <radialGradient id="nebula" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="planet2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065f46"/>
    </radialGradient>
    <radialGradient id="planet3" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="planet4" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </radialGradient>
    <radialGradient id="planet5" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="bhole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="60%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="220" fill="url(#bg6)" rx="10"/>
  <rect width="400" height="220" fill="url(#nebula)" rx="10"/>

  <!-- Stars -->
  <circle cx="15" cy="20" r="1" fill="white" opacity="0.9"/>
  <circle cx="45" cy="8" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="100" cy="35" r="1" fill="white" opacity="0.8"/>
  <circle cx="170" cy="12" r="1" fill="white" opacity="0.9"/>
  <circle cx="230" cy="28" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="290" cy="15" r="1" fill="white" opacity="0.8"/>
  <circle cx="350" cy="40" r="1" fill="white" opacity="0.7"/>
  <circle cx="385" cy="10" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="60" cy="180" r="1" fill="white" opacity="0.6"/>
  <circle cx="330" cy="190" r="1" fill="white" opacity="0.7"/>
  <circle cx="130" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="255" cy="195" r="1" fill="white" opacity="0.6"/>

  <!-- Planet 1 (tiny - Mercury) -->
  <circle cx="40" cy="170" r="10" fill="url(#planet4)"/>

  <!-- Planet 2 (small) -->
  <circle cx="90" cy="140" r="15" fill="url(#planet3)"/>
  <!-- ring -->
  <ellipse cx="90" cy="140" rx="22" ry="5" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>

  <!-- Planet 3 (medium) -->
  <circle cx="160" cy="155" r="22" fill="url(#planet2)"/>
  <!-- surface lines -->
  <ellipse cx="160" cy="155" rx="22" ry="8" fill="none" stroke="#047857" stroke-width="1.5" opacity="0.5"/>

  <!-- Planet 4 (large - Earth-like) -->
  <circle cx="255" cy="145" r="32" fill="url(#planet1)"/>
  <!-- clouds -->
  <ellipse cx="255" cy="135" rx="20" ry="5" fill="white" opacity="0.25"/>
  <ellipse cx="245" cy="150" rx="14" ry="4" fill="white" opacity="0.2"/>

  <!-- Planet 5 (huge - Jupiter-like) -->
  <circle cx="355" cy="155" r="45" fill="url(#planet5)"/>
  <!-- bands -->
  <ellipse cx="355" cy="148" rx="45" ry="6" fill="#c4b5fd" opacity="0.3"/>
  <ellipse cx="355" cy="162" rx="45" ry="5" fill="#7c3aed" opacity="0.3"/>

  <!-- Merge arrows (showing combination) -->
  <path d="M52 165 L72 158" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <path d="M108 147 L136 153" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,2"/>
  <path d="M184 150 L220 148" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,2"/>
  <path d="M290 148 L307 150" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Sparkles on merge points -->
  <text x="68" y="160" font-size="12" fill="#fbbf24">✦</text>
  <text x="130" y="154" font-size="12" fill="#fbbf24">✦</text>
  <text x="216" y="152" font-size="14" fill="#fbbf24">✦</text>
  <text x="302" y="152" font-size="16" fill="#fbbf24">✦</text>

  <!-- Black hole (top left area) -->
  <circle cx="60" cy="55" r="28" fill="url(#bhole)"/>
  <!-- Accretion disk -->
  <ellipse cx="60" cy="55" rx="38" ry="10" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.7"/>
  <ellipse cx="60" cy="55" rx="34" ry="8" fill="none" stroke="#6d28d9" stroke-width="1" opacity="0.5"/>
  <circle cx="60" cy="55" r="14" fill="#000"/>
  <circle cx="60" cy="55" r="10" fill="#000"/>

  <!-- Meteorite -->
  <ellipse cx="320" cy="50" rx="12" ry="6" fill="#78716c" transform="rotate(-30 320 50)"/>
  <path d="M328 44 L340 32" stroke="#f97316" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <path d="M325 46 L335 36" stroke="#fbbf24" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>

  <!-- Combo text -->
  <rect x="148" y="8" width="110" height="26" rx="6" fill="#4f46e5" opacity="0.7"/>
  <text x="203" y="26" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="white" text-anchor="middle">COMBO x5!</text>

  <!-- Score -->
  <rect x="270" y="8" width="120" height="26" rx="6" fill="black" opacity="0.5"/>
  <text x="330" y="26" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">SCORE: 24,300</text>
</svg>
